services:

  # ── KernelWatch daemon ──────────────────────────────────────────────────
  kernelwatch:
    build: .
    image: kernelwatch:latest
    container_name: kernelwatch
    restart: unless-stopped

    # Resource guardrails — the monitor must never starve the host's real
    # workload. eBPF capture + per-event /proc reads are the main cost; a typical
    # web host stays well under these. Raise on very high-syscall-volume hosts.
    cpus: "1.0"
    mem_limit: 256m
    pids_limit: 512

    # eBPF requires access to the host kernel.
    # These are the minimum required privileges.
    privileged: false
    # Run as root (eBPF needs effective caps) but with a tightly scoped set:
    # drop everything, then add back only what's required.
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN     # load eBPF programs into the kernel
      - SYS_PTRACE    # read /proc/<pid>/cgroup for container mapping
      - NET_ADMIN     # attach network tracepoints
    security_opt:
      - apparmor:unconfined  # required for eBPF on some distros (Ubuntu)

    # Mounts kept minimal for portability across any Linux host:
    #  - /proc is provided by pid:host below (no bind mount needed)
    #  - no BTF / bpffs mounts: the program reads tracepoint args by fixed ABI
    #    offset (no CO-RE), so it needs neither /sys/kernel/btf nor /sys/fs/bpf.
    #  - tracefs/debugfs ARE required: attaching a syscall tracepoint reads the
    #    tracepoint id from /sys/kernel/tracing (or /sys/kernel/debug/tracing).
    #    These aren't propagated into the container's mount namespace, so bind
    #    them from the host or attach fails with "neither debugfs nor tracefs
    #    are mounted". (They must be mounted on the host first — see deployment.md.)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # container metadata (future enrichment)
      - /sys/kernel/tracing:/sys/kernel/tracing:rw    # tracepoint id lookup (tracefs)
      - /sys/kernel/debug:/sys/kernel/debug:rw        # fallback path (debugfs/tracing)
      - kernelwatch-logs:/var/log/kernelwatch
      # Host auth log (read-only) for the SSH brute-force tailer. Only consumed
      # when KW_AUTHLOG_ENABLED=true; set KW_AUTHLOG_PATH=/hostlog/auth.log
      # (Debian/Ubuntu) or /hostlog/secure (RHEL/CentOS) to match your distro.
      - /var/log:/hostlog:ro

    # Network: host mode so we can see all container network events
    network_mode: host

    # PID: share the host PID namespace. eBPF reports host-global PIDs; with
    # pid:host the container's /proc reflects the host, so the mapper can read
    # /proc/<pid>/cgroup and resolve which container a PID belongs to.
    # Without this, container resolution always fails and NO alerts fire.
    pid: "host"

    # ── Configuration via environment variables ─────────────────────────────
    # Copy .env.example to .env and adjust before running
    env_file: .env

    # Override specific vars here if needed (takes precedence over .env)
    environment:
      - KW_SERVER_NAME=${KW_SERVER_NAME:-my-server}
      # Persist alerts to the bundled TimescaleDB by default in Compose. The
      # store is best-effort: if the DB is down KernelWatch keeps monitoring.
      - KW_DB_ENABLED=${KW_DB_ENABLED:-true}
      - KW_DB_HOST=${KW_DB_HOST:-127.0.0.1}

    # Start the database first (the store is still resilient if it drops later).
    depends_on:
      db:
        condition: service_healthy

    # Health check: the binary's -health subcommand verifies the heartbeat file
    # is fresh — i.e. the event loop is alive and draining (far stronger than a
    # bare process-exists check).
    healthcheck:
      test: ["CMD", "/usr/local/bin/kernelwatch", "-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Dashboard (web UI over the REST API) ────────────────────────────────────
  # A Next.js app whose server-side routes hold KW_API_TOKEN and proxy the
  # KernelWatch REST API (so the token never reaches the browser). Requires
  # KW_API_ENABLED=true on the daemon.
  dashboard:
    build: ./dashboard
    image: kernelwatch-dashboard:latest
    container_name: kernelwatch-dashboard
    restart: unless-stopped

    mem_limit: 256m

    # Host networking: the kernelwatch API binds 127.0.0.1:8080, which is only
    # reachable from the host network namespace. The dashboard joins it and
    # reaches the API over loopback. HOSTNAME=127.0.0.1 binds the dashboard to
    # loopback too, so the UI is NOT exposed on the host's public interfaces.
    # Front it with a reverse proxy + TLS if you need remote access.
    network_mode: host

    environment:
      - KW_API_URL=${KW_API_URL:-http://127.0.0.1:8080}
      - KW_API_TOKEN=${KW_API_TOKEN}
      - HOSTNAME=127.0.0.1
      - PORT=${DASHBOARD_PORT:-3000}

    depends_on:
      - kernelwatch

    healthcheck:
      # The Next server answers any route; hit the lightweight overview.
      test:
        ["CMD", "node", "-e", "fetch('http://127.0.0.1:'+(process.env.PORT||3000)+'/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── TimescaleDB (events storage) ────────────────────────────────────────────
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: kernelwatch-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KW_DB_NAME:-kernelwatch}
      POSTGRES_USER: ${KW_DB_USER:-kernelwatch}
      POSTGRES_PASSWORD: ${KW_DB_PASSWORD:-changeme}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro  # auto-run on first start
    ports:
      - "127.0.0.1:5432:5432"  # localhost only — never expose to internet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KW_DB_USER:-kernelwatch}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kernelwatch-logs:
  db-data:
