name: Release

# Publishes a pinned, prebuilt image to GHCR on a version tag (e.g. v1.2.0), so
# agency deployments pull `ghcr.io/<owner>/kernelwatch:1.2.0` instead of building
# on each server.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/kernelwatch:${{ steps.ver.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/kernelwatch:latest
